<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh Xuân 2022-2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay fade-in">
    <h1>Thanh Xuân 2022–2026</h1>
    <button onclick="scrollToContent()">Bắt đầu</button>
  </div>
</section>

<!-- GROUP -->
<section class="section fade-in">
  <h2>Ảnh Tập Thể</h2>
  <img src="images/group.jpg">
</section>

<!-- MEMBERS -->
<section class="section fade-in">
  <h2>Thành Viên</h2>
  <div class="grid">
    <div class="card">
      <img src="images/member1.jpg">
      <p>Nguyễn Văn A</p>
    </div>
    <div class="card">
      <img src="images/member2.jpg">
      <p>Trần Thị B</p>
    </div>
  </div>
</section>

<!-- SLIDER -->
<section class="section fade-in">
  <h2>Kỷ Niệm</h2>
  <div class="slider">
    <img class="slide active" src="images/memory1.jpg">
    <img class="slide" src="images/member1.jpg">
    <img class="slide" src="images/member2.jpg">
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Thanh Xuân</p>
</footer>

<script src="script.js"></script>

</html>
